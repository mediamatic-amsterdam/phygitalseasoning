<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediamatic Photo Gallery</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --gray: #f4f4f4; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; line-height: 1.5; }
        h1 { font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 40px; text-align: center; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--gray); overflow: hidden; transition: transform 0.2s ease; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; display: block; background: #ddd; }
        .card-info { padding: 15px; text-align: left; }
        .name { font-weight: bold; font-size: 1.1rem; margin: 0; }
        .error-msg { color: red; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <h1>Mediamatic Gallery</h1>
    <div class="gallery" id="photo-gallery">Loading experience data...</div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQj-z1VbjUTqI5dlncMoJy24LEZ2ahgbAa6NE4bCSPtLClC606DWUBUTWg54a8YVyMf3gonjSmsv1u_/pub?gid=1731633595&single=true&output=csv';

        async function fetchGallery() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                
                // Split rows by newline and filter out empty rows
                const rows = data.split('\n').filter(row => row.trim() !== '');
                const galleryContainer = document.getElementById('photo-gallery');
                galleryContainer.innerHTML = '';

                // Start at index 1 to skip the header row
                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(',');
                    
                    const name = columns[1]?.replace(/"/g, '').trim() || "Anonymous";
                    const photoCell = columns[2]?.replace(/"/g, '').trim();

                    if (photoCell && photoCell.startsWith('http')) {
                        // If there are multiple photos in one cell, take the first one
                        const firstPhoto = photoCell.split(' ')[0]; 

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="${firstPhoto}" alt="Photo by ${name}" loading="lazy">
                            <div class="card-info">
                                <p class="name">${name}</p>
                            </div>
                        `;
                        galleryContainer.appendChild(card);
                    }
                }

                if (galleryContainer.innerHTML === '') {
                    galleryContainer.innerHTML = '<p>No photos uploaded yet.</p>';
                }

            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('photo-gallery').innerHTML = '<p class="error-msg">Failed to load gallery data.</p>';
            }
        }

        fetchGallery();
    </script>
</body>
</html>
